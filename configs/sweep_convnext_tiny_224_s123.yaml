# Config resolution sweep (S5b.1, trục độ phân giải) — convnext_tiny @ 224px, seed 123
# Luận điểm chính 2: 224² ≈ 336² ≈ 448² nhưng rẻ hơn nhiều.
# Chạy: python scripts/train.py --config configs/sweep_convnext_tiny_224_s123.yaml
# Máy: Google Colab (T4 16GB) — cùng 1 loại GPU cho toàn bộ ma trận sweep để
# bảng accuracy-vs-cost so sánh được (xem docs/ENVIRONMENT.md §5).

run_name: sweep_convnext_tiny_224_s123
seed: 123

data:
  split_dir: data/interim          # chứa sweep_train.csv / sweep_val.csv / sweep_test.csv (DÙNG CHUNG cho cả 224/336/448)
  split_prefix: sweep
  image_root: data/processed        # tự dựng path: {image_root}/{img_size}/{sha[:2]}/{sha}.png — bỏ qua cột image_path trong CSV
  channel_stats: data/interim/channel_stats_sweep.json   # tính riêng trên sweep_train (5,498 ảnh)
  img_size: 224
  channels: full                   # CỐ ĐỊNH — ConvNeXt-Tiny chỉ chạy trục độ phân giải (không lặp ablation kênh), xem docs/BACKLOG.md S5b.1
  batch_size: 8                    # CỐ ĐỊNH cho cả 3 độ phân giải (công bằng BatchNorm — xem thảo luận docs/EXPERIMENTS.md)
  num_workers: 4
  augment: false

model:
  name: convnext_tiny
  num_classes: 2
  pretrained: true
  freeze_backbone: false

train:
  epochs: 30
  lr: 0.0001
  weight_decay: 0.0001
  early_stop_patience: 6
  amp: true
  class_weights: auto
  grad_accum_steps: 1              # không dùng — batch=8 cố định đã đủ công bằng, xem thảo luận

paths:
  out_dir: experiments

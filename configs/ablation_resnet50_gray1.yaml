# Ablation kênh — trường hợp GRAY1: model 1 kênh THẬT (in_chans=1)
# Đây là baseline "ảnh xám thuần" — khác gray3 (nhân bản gray thành 3 kênh).
# Chạy: python scripts/train.py --config configs/ablation_resnet50_gray1.yaml
#
# Các cấu hình ablation khác chỉ đổi `channels` + `run_name` (và in_chans=3):
#   gray3   → channels: gray3,   in_chans: 3
#   +entropy→ channels: +entropy,in_chans: 3
#   +ascii  → channels: +ascii,  in_chans: 3
#   full    → channels: full,    in_chans: 3

run_name: ablation_resnet50_gray1
seed: 42

data:
  split_dir: data/interim
  channel_stats: data/interim/channel_stats.json
  img_size: 224
  channels: gray1          # → dataset trả tensor 1×H×W (kênh gray)
  batch_size: 32
  num_workers: 4
  augment: false
  split_prefix: split      # dùng cùng bộ split detection cho mọi cấu hình ablation

model:
  name: resnet50           # ablation chốt trên ResNet50 (xem docs/EXPERIMENTS.md)
  num_classes: 2
  pretrained: true
  in_chans: 1              # ← model 1 kênh thật (conv đầu = tổng 3 kênh pretrained)

train:
  epochs: 30
  lr: 0.0001
  weight_decay: 0.0001
  early_stop_patience: 6
  amp: true
  class_weights: auto
